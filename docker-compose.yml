version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: fim-api
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
    env_file:
      - apps/api/.env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./apps/api/uploads:/app/apps/api/uploads
