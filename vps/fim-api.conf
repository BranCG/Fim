server {
    listen 80;
    server_name api.fim.cl;

    # Redireccionar todo el tráfico HTTP a HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.fim.cl;

    # Rutas del certificado SSL de Let's Encrypt (Certbot las creará aquí)
    ssl_certificate /etc/letsencrypt/live/api.fim.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.fim.cl/privkey.pem;

    # Parámetros recomendados de seguridad SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Tamaño máximo de subida de archivos (selfies y comprobantes)
    client_max_body_size 12M;

    # Optimización: Nginx sirve directamente los archivos estáticos cargados (bypasseando Node)
    location /uploads/ {
        alias /var/www/Fim/apps/api/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # Proxy inverso para el servidor Express + Socket.io (puerto 3001)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Cabeceras necesarias para WebSockets (Socket.io)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Cabeceras estándar de proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tiempos de espera altos para mantener WebSockets activos sin desconectarse
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 75s;
    }
}
