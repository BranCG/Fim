server {

    server_name fim-api.duckdns.org;



    client_max_body_size 12M;



    location /uploads/ {

        alias /var/www/Fim/apps/api/uploads/;

        expires 30d;

        add_header Cache-Control "public, max-age=2592000";

        access_log off;

    }



    location / {

        proxy_pass http://127.0.0.1:3001;

        proxy_http_version 1.1;



        proxy_set_header Upgrade $http_upgrade;

        proxy_set_header Connection "upgrade";



        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto $scheme;



        proxy_read_timeout 86400s;

        proxy_send_timeout 86400s;

        proxy_connect_timeout 75s;

    }


    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/fim-api.duckdns.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/fim-api.duckdns.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = fim-api.duckdns.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot



    listen 80;

    server_name fim-api.duckdns.org;
    return 404; # managed by Certbot


}